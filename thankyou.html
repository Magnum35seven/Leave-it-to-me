<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Received — Leave It To Me</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400;1,700&family=Lora:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
<style>
  :root {
    --gold: #c9a84c;
    --gold-light: #f0d98a;
    --gold-pale: #fdf8ee;
    --ink: #1a1209;
    --ink-soft: #7a6444;
    --cream: #faf6ee;
    --parchment: #e8dcc4;
    --serif: 'Playfair Display', Georgia, serif;
    --body: 'Lora', Georgia, serif;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background-color: var(--cream);
    color: var(--ink);
    font-family: var(--body);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 2rem;
  }
  .box {
    max-width: 520px;
    text-align: center;
    padding: 4rem 3rem;
    background: white;
    border: 1px solid var(--parchment);
    border-radius: 2px;
  }
  .ornament {
    font-size: 2rem;
    color: var(--gold);
    display: block;
    margin-bottom: 1.5rem;
    opacity: 0.7;
  }
  h1 {
    font-family: var(--serif);
    font-size: 2.2rem;
    font-weight: 700;
    font-style: italic;
    color: var(--ink);
    margin-bottom: 1.25rem;
    line-height: 1.2;
  }
  p {
    color: var(--ink-soft);
    font-size: 1rem;
    line-height: 1.8;
    margin-bottom: 1rem;
  }
  a {
    display: inline-block;
    margin-top: 1.5rem;
    font-family: var(--serif);
    font-style: italic;
    color: var(--gold);
    text-decoration: none;
    font-size: 0.95rem;
    border-bottom: 1px solid var(--parchment);
    padding-bottom: 2px;
  }
  a:hover { border-bottom-color: var(--gold); }
</style>
</head>
<body>
  <div class="box">
    <span class="ornament">❧ ✦ ❧</span>
    <h1>Your message has been received.</h1>
    <p>With great excitement and not a small amount of gratitude.</p>
    <p>I will be in touch shortly with my details. Thank you for reading — and for considering.</p>
    <a href="https://magnum35seven.github.io/leave-it-to-me/">← Return to the site</a>
  </div>
</body>
</html>
